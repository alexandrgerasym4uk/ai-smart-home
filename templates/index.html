<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Розумний Будинок - KPI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>Мій Розумний Будинок</h1>
    <p>Ласкаво просимо до панелі керування!</p>

    <hr>

    <div class="control-panel">
        <h3>💡 ОСВІТЛЕННЯ</h3>
        <div class="grid-container">
            <button id="btn-vitalnya" onclick="toggleLight('vitalnya')">🛋️ Вітальня</button>
            <button id="btn-kukhnya" onclick="toggleLight('kukhnya')">🍳 Кухня</button>
            <button id="btn-spalnya" onclick="toggleLight('spalnya')">🛏️ Спальня</button>
            <button id="btn-garderob" onclick="toggleLight('garderob')">🚪 Гардероб</button>
            
            <button id="btn-stilnitsya" onclick="toggleLight('stilnitsya')">🥢 Стільниця</button>
            <button id="btn-polytsi" onclick="toggleLight('polytsi')">📚 Полиці</button>
            <button id="btn-lampa1" onclick="toggleLight('lampa1')">💡 Лампа 1</button>
            <button id="btn-lampa2" onclick="toggleLight('lampa2')">💡 Лампа 2</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <div class="control-panel">
        <h3>💨 КЛІМАТ ТА ВЕНТИЛЯЦІЯ</h3>
        
        <div class="climate-container">
            <div class="climate-row">
                <button id="btn-ventilation" onclick="toggleFan()">Вентиляція</button>
            </div>
            
            <hr class="sub-divider">

            <div class="climate-row">
                <div class="climate-info">
                    <span class="climate-title">❄️ Кондиціонер</span>
                    <span id="val-ac" class="climate-value">22°C</span>
                </div>
                <div class="climate-controls">
                    <button id="btn-ac" onclick="toggleAC()">Увімкнути</button>
                    <input type="range" id="range-ac" min="16" max="30" step="1" oninput="changeACTemp(this.value)">
                </div>
            </div>
            
            <div class="ac-extended-modes">
                <div class="select-group">
                    <label>Режим:</label>
                    <select id="select-ac-mode" onchange="changeACParam('mode', this.value)">
                        <option value="cool">Cool ❄️</option>
                        <option value="heat">Heat 🔥</option>
                        <option value="dry">Dry 💧</option>
                        <option value="fan">Fan 💨</option>
                    </select>
                </div>

                <div class="select-group">
                    <label>Вентилятор:</label>
                    <select id="select-ac-fan" onchange="changeACParam('fan_speed', this.value)">
                        <option value="low">Low 🔈</option>
                        <option value="medium">Medium 🔉</option>
                        <option value="high">High 🔊</option>
                        <option value="auto">Auto 🔄</option>
                    </select>
                </div>

                <div class="select-group">
                    <label>Шторки (Swing):</label>
                    <select id="select-ac-swing" onchange="changeACParam('swing', this.value)">
                        <option value="fixed">Fixed 📌</option>
                        <option value="vertical">Vertical ↕️</option>
                        <option value="horizontal">Horizontal ↔️</option>
                        <option value="full">Full 🔄</option>
                    </select>
                </div>
            </div>

            <hr class="sub-divider">

            <div class="climate-row">
                <div class="climate-info">
                    <span class="climate-title">🔥 Тепла підлога</span>
                    <span id="val-floor" class="climate-value">0%</span>
                </div>
                <div class="climate-controls">
                    <button id="btn-floor" onclick="toggleFloor()">Увімкнути</button>
                    <input type="range" id="range-floor" min="0" max="100" step="5" oninput="changeFloorPower(this.value)">
                </div>
            </div>
        </div>
    </div>


    <div class="control-panel">
        <h3>🤖 РОБОТ-ПИЛОСОС</h3>
        
        <div class="vacuum-container">
            <div class="vacuum-status-row">
                <span>Поточний стан:</span>
                <strong id="val-vacuum-state" class="status-badge">Заряджається</strong>
            </div>

            <div class="vacuum-buttons">
                <button id="btn-vac-start" onclick="sendVacuumCmd('start')">▶️ Прибирання</button>
                <button id="btn-vac-pause" onclick="sendVacuumCmd('pause')">⏸️ Пауза</button>
                <button id="btn-vac-home" onclick="sendVacuumCmd('home')">🏠 На базу</button>
            </div>

            <hr class="sub-divider">

            <div class="ac-extended-modes">
                <div class="select-group">
                    <label>Потужність всмоктування:</label>
                    <select id="select-vac-fan" onchange="changeVacParam('fan', this.value)">
                        <option value="101">Quiet 🤫</option>
                        <option value="102">Balanced 🔄</option>
                        <option value="103">Turbo ⚡</option>
                        <option value="104">Max 🚀</option>
                    </select>
                </div>

                <div class="select-group">
                    <label>Рівень води:</label>
                    <select id="select-vac-water" onchange="changeVacParam('water', this.value)">
                        <option value="200">Off ❌</option>
                        <option value="201">Low 💧</option>
                        <option value="202">Medium 💧💧</option>
                        <option value="203">High 🌊</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
